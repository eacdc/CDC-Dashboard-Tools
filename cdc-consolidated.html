<script>
var e=React.createElement,useState=React.useState,useRef=React.useRef;
var TPG={'Capital Account':null,'Revenue Account':null,'Current Assets':'Capital Account','Current Liabilities':'Capital Account','Fixed Assets':'Capital Account','Loans (Liability)':'Capital Account','Investments':'Capital Account','Suspense A/c':'Capital Account','Misc. Expenses (ASSET)':'Capital Account','Branch / Divisions':'Capital Account','Direct Incomes':'Revenue Account','Direct Expenses':'Revenue Account','Indirect Incomes':'Revenue Account','Indirect Expenses':'Revenue Account','Sales Accounts':'Revenue Account','Purchase Accounts':'Revenue Account','Reserves & Surplus':'Capital Account'};
var PL_CATS={'Sales Accounts':'revenue','Direct Incomes':'revenue','Indirect Incomes':'revenue','Purchase Accounts':'purchase','Direct Expenses':'direct_expense','Indirect Expenses':'indirect_expense'};
var SKIP_ROOTS={'Capital Account':1,'Revenue Account':1};
var CASH_VCH={'Bank Receipt':1,'Bank Payments':1,'Bank Payment':1,'Cash Paynent':1,'Cash Payment':1,'Cash Voucher':1,'Receipt':1,'Payment':1,'Contra':1};
var GRID_COL1=320;

function parseHierarchy(text){var j=JSON.parse(text);var g=j.groups||{};var l=j.ledgers||{};for(var k in TPG)if(!g.hasOwnProperty(k))g[k]=TPG[k];return{groups:g,ledgers:l};}

function mergeHierarchies(h1,h2){
  var g={},l={};
  var k;for(k in h1.groups)g[k]=h1.groups[k];for(k in h2.groups)if(!g.hasOwnProperty(k))g[k]=h2.groups[k];
  for(k in h1.ledgers)l[k]=h1.ledgers[k];for(k in h2.ledgers)if(!l.hasOwnProperty(k))l[k]=h2.ledgers[k];
  for(k in TPG)if(!g.hasOwnProperty(k))g[k]=TPG[k];
  return{groups:g,ledgers:l};
}

function findIBLedgers(xd){
  var ib={};
  for(var ln in xd.ledgers){
    if(xd.ledgers[ln]==='Branch / Divisions')ib[ln]=1;
    var ch=getChainRaw(ln,xd);if(ch.indexOf('Branch / Divisions')>=0)ib[ln]=1;
  }
  return ib;
}
function getChainRaw(name,xd){
  var p=xd.ledgers[name];if(!p){if(xd.groups[name])p=name;else return['Unclassified'];}
  var ch=[p];var sn={};while(p&&xd.groups[p]&&!sn[p]){sn[p]=1;p=xd.groups[p];if(p)ch.unshift(p);}return ch;
}

function parseStock(text){var lines=text.split('\n');var stock=Array(12).fill(0);for(var i=1;i<lines.length;i++){if(!lines[i].trim())continue;var c=lines[i].split(',');try{var idx=parseInt(c[0]);var am=parseFloat((c[1]||'0').replace(/,/g,''));if(!isNaN(idx)&&idx>=0&&idx<12)stock[idx]=am;}catch(ex){}}return stock;}
function generateStockTemplate(){var MN=['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];var csv='Month Index,Opening Stock Value,Month Name\n';for(var i=0;i<12;i++)csv+=i+',0,'+MN[i]+'\n';var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='stock_template.csv';a.click();}

function norm(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'');}
function stem(s){var w=s.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(function(t){return t.length>0;});return w.map(function(t){return t.replace(/s$/,'');}).sort().join('|');}
function buildLookups(xd){var lk={},tk={},gn={},gt={};for(var n in xd.ledgers){lk[norm(n)]=n;tk[stem(n)]=n;}for(var g in xd.groups){gn[norm(g)]=g;gt[stem(g)]=g;}return{lk:lk,tk:tk,gn:gn,gt:gt};}
function findParent(name,xd,lu){if(xd.ledgers[name])return xd.ledgers[name];var nk=norm(name);if(lu.lk[nk])return xd.ledgers[lu.lk[nk]];var st=stem(name);if(lu.tk[st])return xd.ledgers[lu.tk[st]];return null;}
function getChain(name,xd,lu){
  var p=findParent(name,xd,lu);
  if(!p){if(xd.groups[name])p=name;else{var nk=norm(name);if(lu.gn[nk])p=lu.gn[nk];else{var st=stem(name);if(lu.gt[st])p=lu.gt[st];else{var clean=name.replace(/'s /g,' ').replace(/'/g,'');var st2=stem(clean);if(lu.tk[st2]){p=xd.ledgers[lu.tk[st2]];if(p){var ch=[p];var sn={};while(p&&xd.groups[p]&&!sn[p]){sn[p]=1;p=xd.groups[p];if(p)ch.unshift(p);}return ch;}}if(lu.gt[st2])p=lu.gt[st2];}}}}
  if(!p)return['Unclassified'];
  var ch=[p];var sn={};while(p&&xd.groups[p]&&!sn[p]){sn[p]=1;p=xd.groups[p];if(p)ch.unshift(p);}return ch;
}
function classify(name,xd,lu){var chain=getChain(name,xd,lu);for(var i=0;i<chain.length;i++){if(PL_CATS[chain[i]])return PL_CATS[chain[i]];}return 'excluded';}
function monthKey(ds){var m=parseInt(ds.substring(4,6));return(m-4+12)%12;}

function buildTree(ledgerData,xd,lu){
  var gA={};for(var ln in ledgerData){var mo=ledgerData[ln];if(mo.every(function(v){return v===0;}))continue;var ch=getChain(ln,xd,lu);var ig=ch[ch.length-1];if(!gA[ig])gA[ig]={};gA[ig][ln]=mo;}
  var gC={};for(var gn in xd.groups){var gp=xd.groups[gn];if(gp){if(!gC[gp])gC[gp]=[];if(gC[gp].indexOf(gn)<0)gC[gp].push(gn);}}
  function bn(gn,d){var nd={name:gn,monthly:Array(12).fill(0),depth:d,type:'group'};var kids=(gC[gn]||[]).sort(),cns=[];for(var ki=0;ki<kids.length;ki++){var cg=kids[ki];if(SKIP_ROOTS[cg]){var gk=(gC[cg]||[]).sort();for(var gi=0;gi<gk.length;gi++){var gn2=bn(gk[gi],d+1);if(gn2.monthly.some(function(v){return v!==0;})){cns.push(gn2);gn2.monthly.forEach(function(v,i){nd.monthly[i]+=v;});}}if(gA[cg]){for(var aln in gA[cg]){var alm=gA[cg][aln];alm.forEach(function(v,i){nd.monthly[i]+=v;});cns.push({name:aln,monthly:alm,depth:d+1,type:'ledger'});}}continue;}var cn=bn(cg,d+1);if(cn.monthly.some(function(v){return v!==0;})){cns.push(cn);cn.monthly.forEach(function(v,i){nd.monthly[i]+=v;});}}if(cns.length)nd.children=cns;if(gA[gn]){var lN=[];for(var ln in gA[gn]){var lm=gA[gn][ln];lm.forEach(function(v,i){nd.monthly[i]+=v;});lN.push({name:ln,monthly:lm,depth:d+1,type:'ledger'});}lN.sort(function(a,b){return Math.abs(b.monthly.reduce(function(s,v){return s+v;},0))-Math.abs(a.monthly.reduce(function(s,v){return s+v;},0));});nd.ledgers=lN;}nd.monthly=nd.monthly.map(function(v){return Math.round(v*100)/100;});return nd;}
  var level2={};for(var root in SKIP_ROOTS){(gC[root]||[]).forEach(function(k){level2[k]=1;});}var orphans=[];for(var g in xd.groups){var p=xd.groups[g];if((!p||!xd.groups.hasOwnProperty(p))&&!SKIP_ROOTS[g])orphans.push(g);}var topArr=Object.keys(level2).concat(orphans);var seen={},unique=[];topArr.forEach(function(t){if(!seen[t]){seen[t]=1;unique.push(t);}});unique.sort();
  var tree=[];for(var ti=0;ti<unique.length;ti++){var n=bn(unique[ti],1);if(n.monthly.some(function(v){return v!==0;}))tree.push(n);}
  if(gA['Unclassified']){var un={name:'Unclassified',monthly:Array(12).fill(0),depth:1,type:'group'};var uL=[];for(var ln in gA['Unclassified']){var lm=gA['Unclassified'][ln];lm.forEach(function(v,i){un.monthly[i]+=v;});uL.push({name:ln,monthly:lm,depth:2,type:'ledger'});}un.ledgers=uL;if(un.monthly.some(function(v){return v!==0;}))tree.push(un);}return tree;
}

function processData(vouchers,xd,stock,ibLedgers){
  var lu=buildLookups(xd);var MN=['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
  var dates=vouchers.map(function(v){return v.date;}).sort();var lastD=dates[dates.length-1];var lastY=parseInt(lastD.substring(0,4)),lastM=parseInt(lastD.substring(4,6));var fy=lastM>=4?lastY:lastY-1;
  var fyStart=String(fy)+'04';vouchers=vouchers.filter(function(v){return v.date>=fyStart+'01';});
  var months=MN.map(function(m,i){var mo=(3+i)%12;var yr=mo>=3?fy:fy+1;return m+"'"+String(yr).slice(-2);});

  // P&L: skip inter-branch ledgers
  var plData={revenue:{},purchase:{},direct_expense:{},indirect_expense:{},excluded:{}};
  for(var vi=0;vi<vouchers.length;vi++){var v=vouchers[vi];var mi=monthKey(v.date);if(mi<0||mi>=12)continue;
    for(var ln in v.ledgers){if(ibLedgers[ln])continue;var amt=v.ledgers[ln];var cat=classify(ln,xd,lu);if(!plData[cat])plData[cat]={};if(!plData[cat][ln])plData[cat][ln]=Array(12).fill(0);plData[cat][ln][mi]+=amt;}
    // Also check party_ledgers for P&L items (some expenses may be there)
    for(var ln in v.party_ledgers){if(ibLedgers[ln])continue;var cat2=classify(ln,xd,lu);if(cat2!=='excluded'){if(!plData[cat2])plData[cat2]={};if(!plData[cat2][ln])plData[cat2][ln]=Array(12).fill(0);plData[cat2][ln][mi]+=v.party_ledgers[ln];}}
  }
  for(var cat in plData){for(var ln in plData[cat]){plData[cat][ln]=plData[cat][ln].map(function(v){return Math.round(v*100)/100;});}}

  // Cashflow: Approach G with inter-branch elimination
  var cfInflows={},cfOutflows={};
  var BK=['bank accounts','cash-in-hand','cash-in hand'];var OD=['bank od','bank occ'];
  function chainHas(pn,kws){var ch=getChain(pn,xd,lu).join('>').toLowerCase();for(var b=0;b<kws.length;b++){if(ch.indexOf(kws[b])>=0)return true;}return false;}
  var RCV={'Bank Receipt':1,'Receipt':1};var PAY={'Bank Payments':1,'Bank Payment':1,'Cash Paynent':1,'Cash Payment':1,'Cash Voucher':1,'Payment':1};
  for(var vi=0;vi<vouchers.length;vi++){var v=vouchers[vi];if(!CASH_VCH[v.type])continue;var mi=monthKey(v.date);if(mi<0||mi>=12)continue;
    var pls=v.party_ledgers||{};var lds=v.ledgers||{};var all={};for(var k in pls)all[k]=pls[k];for(var k in lds)if(!all.hasOwnProperty(k))all[k]=lds[k];
    var isR=!!RCV[v.type],isP=!!PAY[v.type],isC=v.type==='Contra';
    for(var pn in all){if(ibLedgers[pn])continue;if(chainHas(pn,BK))continue;if(chainHas(pn,OD))continue;
      if(isR){if(!cfInflows[pn])cfInflows[pn]=Array(12).fill(0);cfInflows[pn][mi]+=Math.round(all[pn]*100)/100;}
      else if(isP){if(!cfOutflows[pn])cfOutflows[pn]=Array(12).fill(0);cfOutflows[pn][mi]+=Math.round(all[pn]*-1*100)/100;}
      else if(isC){var cv=Math.round(all[pn]*-1*100)/100;if(cv>0){if(!cfInflows[pn])cfInflows[pn]=Array(12).fill(0);cfInflows[pn][mi]+=cv;}else if(cv<0){if(!cfOutflows[pn])cfOutflows[pn]=Array(12).fill(0);cfOutflows[pn][mi]+=Math.abs(cv);}}
    }}

  // PCFC/PCRE Journal handling: Journals where Loan is Cr (negative in ledgers) = loan closure
  // The Dr side (debtor or branch in party_ledgers) = the source of repayment
  // Treat as: Inflow from debtor/source + Outflow to loan repayment
  var LOAN_KW=['secured loans','unsecured loans','pcfc','pcre','wcdl','term loan'];
  function isLoan(pn){var cs=getChain(pn,xd,lu).join('>').toLowerCase();for(var i=0;i<LOAN_KW.length;i++){if(cs.indexOf(LOAN_KW[i])>=0)return true;}return false;}
  for(var vi=0;vi<vouchers.length;vi++){var v=vouchers[vi];if(v.type!=='Journal')continue;var mi=monthKey(v.date);if(mi<0||mi>=12)continue;
    var pls=v.party_ledgers||{};var lds=v.ledgers||{};
    // Check if any ledger entry is a loan being Cr'd (negative = reducing loan)
    var hasLoanCr=false;for(var ln in lds){if(lds[ln]<0&&isLoan(ln)){hasLoanCr=true;break;}}
    if(!hasLoanCr)continue;
    // Process: loan Cr entries → outflow (loan repayment), non-loan non-IB Dr entries → inflow (debtor receipt)
    for(var ln in lds){if(!isLoan(ln))continue;if(lds[ln]>=0)continue;// Only Cr loans
      var repayAmt=Math.round(Math.abs(lds[ln])*100)/100;
      if(!cfOutflows[ln])cfOutflows[ln]=Array(12).fill(0);cfOutflows[ln][mi]+=repayAmt;}
    // Dr side in party_ledgers = inflow source (debtor or branch)
    for(var pn in pls){if(pls[pn]<=0)continue;if(ibLedgers[pn])continue;// Skip branch entries in consolidated
      var recAmt=Math.round(pls[pn]*100)/100;
      if(!cfInflows[pn])cfInflows[pn]=Array(12).fill(0);cfInflows[pn][mi]+=recAmt;}
    // Also Dr entries in ledgers that are NOT loans (like currency diff) - these are expenses, skip for cashflow
  }

  // Branch Settlement Journals: Debtor Dr + Branch Cr in party_ledgers
  // Pattern: Ahmedabad journal → Dr MELBA (positive), Cr CDC Printers Kolkata (negative)
  // This means: client payment received by other branch, debtor squared off
  // Treat debtor side as INFLOW (receipt from client)
  // Branch side is eliminated (inter-branch)
  // Note: Skip if already handled by PCFC logic above (has loan Cr in ledgers)
  function isDebtor(pn){return getChain(pn,xd,lu).join('>').toLowerCase().indexOf('sundry debtors')>=0;}
  for(var vi=0;vi<vouchers.length;vi++){var v=vouchers[vi];if(v.type!=='Journal')continue;var mi=monthKey(v.date);if(mi<0||mi>=12)continue;
    var pls=v.party_ledgers||{};var lds=v.ledgers||{};
    // Skip if this is a PCFC journal (already handled above)
    var hasLoanCr2=false;for(var ln in lds){if(lds[ln]<0&&isLoan(ln)){hasLoanCr2=true;break;}}
    if(hasLoanCr2)continue;
    // Check if there's a branch entry in party_ledgers
    var hasBranch=false;for(var pn in pls){if(ibLedgers[pn]){hasBranch=true;break;}}
    if(!hasBranch)continue;
    // Check if there's a debtor entry
    var hasDebtor=false;for(var pn in pls){if(!ibLedgers[pn]&&isDebtor(pn)){hasDebtor=true;break;}}
    if(!hasDebtor)continue;
    // Process: debtor Dr (positive) = receipt inflow
    for(var pn in pls){if(ibLedgers[pn])continue;if(!isDebtor(pn))continue;
      if(pls[pn]>0){var rAmt=Math.round(pls[pn]*100)/100;if(!cfInflows[pn])cfInflows[pn]=Array(12).fill(0);cfInflows[pn][mi]+=rAmt;}
      else if(pls[pn]<0){var rAmt=Math.round(Math.abs(pls[pn])*100)/100;if(!cfOutflows[pn])cfOutflows[pn]=Array(12).fill(0);cfOutflows[pn][mi]+=rAmt;}
    }
  }var revTree=buildTree(plData.revenue,xd,lu),purchTree=buildTree(plData.purchase,xd,lu),dirExpTree=buildTree(plData.direct_expense,xd,lu),indExpTree=buildTree(plData.indirect_expense,xd,lu),exclTree=buildTree(plData.excluded,xd,lu);
  var cfInTree=buildTree(cfInflows,xd,lu),cfOutTree=buildTree(cfOutflows,xd,lu);
  function sumTree(tree){var m=Array(12).fill(0);tree.forEach(function(n){n.monthly.forEach(function(v,i){m[i]+=v;});});return m.map(function(v){return Math.round(v*100)/100;});}
  var revM=sumTree(revTree),purchM=sumTree(purchTree),dirExpM=sumTree(dirExpTree),indExpM=sumTree(indExpTree);
  var stockM=Array(12).fill(0);if(stock){for(var i=0;i<12;i++){var op=stock[i]||0;var cl=(i<11)?(stock[i+1]||0):(stock[11]||0);stockM[i]=Math.round((op-cl)*100)/100;}}
  var gpM=months.map(function(_,i){return Math.round((revM[i]+purchM[i]+dirExpM[i]+stockM[i])*100)/100;});
  var npM=months.map(function(_,i){return Math.round((gpM[i]+indExpM[i])*100)/100;});
  var cfInM=sumTree(cfInTree),cfOutM=sumTree(cfOutTree);
  var cfNetM=months.map(function(_,i){return Math.round((cfInM[i]-cfOutM[i])*100)/100;});
  return{months:months,fy:fy+'-'+(fy+1),pl:{revTree:revTree,purchTree:purchTree,dirExpTree:dirExpTree,indExpTree:indExpTree,exclTree:exclTree,revM:revM,purchM:purchM,dirExpM:dirExpM,indExpM:indExpM,stockM:stockM,gpM:gpM,npM:npM},cf:{inTree:cfInTree,outTree:cfOutTree,inM:cfInM,outM:cfOutM,netM:cfNetM},stats:{vouchers:vouchers.length,cfInParties:Object.keys(cfInflows).length,cfOutParties:Object.keys(cfOutflows).length}};
}

function fmt(n){if(n===0)return'\u2014';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e7)return s+(a/1e7).toFixed(2)+' Cr';if(a>=1e5)return s+(a/1e5).toFixed(2)+' L';if(a>=1e3)return s+(a/1e3).toFixed(1)+' K';return s+Math.round(a);}
var expandRegistry={};function regKey(p,n,i){return p+'|'+n+'_'+i;}
function sortNodes(nodes,byVal){if(!nodes)return nodes;var s=nodes.slice();if(byVal)s.sort(function(a,b){return Math.abs(b.monthly.reduce(function(s,v){return s+v;},0))-Math.abs(a.monthly.reduce(function(s,v){return s+v;},0));});else s.sort(function(a,b){return a.name.localeCompare(b.name);});return s;}
