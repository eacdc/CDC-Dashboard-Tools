function fmt(n){if(n===0)return'\u2014';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e7)return s+(a/1e7).toFixed(2)+' Cr';if(a>=1e5)return s+(a/1e5).toFixed(2)+' L';if(a>=1e3)return s+(a/1e3).toFixed(1)+' K';return s+Math.round(a);}

function DrillModal(props){

  var sS=useState(''),srch=sS[0],setSrch=sS[1];

  var fyStart=String(startFY)+'0401';var fyEnd=String(startFY+Math.ceil(monthCount/12))+'0401';
  function fmtDate(d){if(!d||d.length<8)return d||'';return d.substring(6,8)+'-'+d.substring(4,6)+'-'+d.substring(0,4);}
  var contributing=[];

      var effLn=(ovrAcct&&(cat==='revenue'||cat==='purchase'))?ovrAcct:ln;
      if(effLn===t.ledger){amt+=v.ledgers[ln];foundIn='ledgers';}
    }
    for(var ln2 in (v.party_ledgers||{})){
      if(ln2===t.ledger){amt+=v.party_ledgers[ln2];foundIn=foundIn||'party';}
    }
    if(foundIn){
      var dom=null,domAbs=0;for(var p in (v.party_ledgers||{})){var a=Math.abs(v.party_ledgers[p]);if(a>domAbs){domAbs=a;dom=p;}}
      contributing.push({date:v.date,type:v.type,party:dom||'',amount:amt,branch:v._branch||'',overridden:!!ovrAcct&&foundIn==='ledgers'});
    }

    amt_asc:function(a,b){return a.amount-b.amount;},

    type_asc:function(a,b){return (a.type||'').localeCompare(b.type||'');}
  };

  var sumAmt=contributing.reduce(function(s,r){return s+r.amount;},0);

  function thSortAmt(){var nxt;if(sortBy==='amt_desc')nxt='amt_asc';else if(sortBy==='amt_asc')nxt='abs_desc';else nxt='amt_desc';var arrow=sortBy==='amt_asc'?' ↑':sortBy==='amt_desc'?' ↓':sortBy==='abs_desc'?' |↓|':'';return e('span',{onClick:function(){setSortBy(nxt);},style:{cursor:'pointer',userSelect:'none'}},'AMOUNT'+arrow);}
  return e('div',{onClick:function(ev){if(ev.target===ev.currentTarget)props.onClose();},style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(15,23,42,0.55)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}},
    e('div',{style:{background:'#fff',width:'100%',maxWidth:'1100px',maxHeight:'90vh',borderRadius:'12px',display:'flex',flexDirection:'column',boxShadow:'0 20px 50px rgba(0,0,0,0.3)'}},
      e('div',{style:{padding:'16px 22px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'12px'}},
        e('div',null,e('div',{style:{fontSize:'10px',letterSpacing:'2px',color:'var(--text3)',textTransform:'uppercase',fontFamily:'var(--mono)'}},'DRILL DOWN'+(t.monthIdx>=0?' · '+(data.months[t.monthIdx]||''):' · all months')),e('div',{style:{fontSize:'17px',fontWeight:700,marginTop:'2px'}},t.ledger),e('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'4px',fontFamily:'var(--mono)'}},contributing.length+' vouchers · ',e('span',{className:'num',style:{fontWeight:600,color:sumAmt>=0?'var(--text)':'var(--red)'}},'₹'+fmt(sumAmt)))),
        e('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
          e('select',{value:sortBy,onChange:function(ev){setSortBy(ev.target.value);},style:{padding:'5px 8px',border:'1px solid var(--border)',borderRadius:'5px',fontSize:'11px',fontFamily:'var(--mono)',background:'var(--bg)',cursor:'pointer'}},
            e('option',{value:'date_asc'},'Date ↑ (oldest)'),

          e('button',{onClick:copyAsText,style:{background:'var(--cyan)',border:'none',color:'#fff',padding:'5px 12px',borderRadius:'5px',cursor:'pointer',fontSize:'11px',fontFamily:'var(--mono)',fontWeight:600}},'📋'),
          e('button',{onClick:props.onClose,style:{background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--text2)',padding:'5px 12px',borderRadius:'5px',cursor:'pointer',fontSize:'14px',fontWeight:600}},'✕'))),
      e('div',{style:{overflowY:'auto',flex:1}},
        e('div',{style:{display:'grid',gridTemplateColumns:'95px 110px minmax(220px,1fr) 100px 120px',background:'var(--bg3)',padding:'8px 0',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:1}},
          e('div',{style:{padding:'4px 14px',fontSize:'10px',fontWeight:700,color:'var(--text3)',fontFamily:'var(--mono)'}},thSort('DATE','date')),
          e('div',{style:{padding:'4px 14px',fontSize:'10px',fontWeight:700,color:'var(--text3)',fontFamily:'var(--mono)'}},thSort('TYPE','type')),

          e('div',{style:{padding:'4px 14px',fontSize:'10px',fontWeight:700,color:'var(--text3)',fontFamily:'var(--mono)'}},'BRANCH'),

        contributing.length===0?
