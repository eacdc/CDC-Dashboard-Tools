<div id="root"></div>
<script>
(function(){
var e=React.createElement,useState=React.useState,useRef=React.useRef;
var APP_VERSION='v1.12.1';var APP_BUILD='13-Jun-2026';
try{if('caches' in window){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}}catch(_){}
var TPG={'Capital Account':null,'Revenue Account':null,'Current Assets':'Capital Account','Current Liabilities':'Capital Account','Fixed Assets':'Capital Account','Loans (Liability)':'Capital Account','Investments':'Capital Account','Suspense A/c':'Capital Account','Misc. Expenses (ASSET)':'Capital Account','Branch / Divisions':'Capital Account','Direct Incomes':'Revenue Account','Direct Expenses':'Revenue Account','Indirect Incomes':'Revenue Account','Indirect Expenses':'Revenue Account','Sales Accounts':'Revenue Account','Purchase Accounts':'Revenue Account','Reserves & Surplus':'Capital Account'};
var PL_CATS={'Sales Accounts':'revenue','Direct Incomes':'revenue','Indirect Incomes':'revenue','Purchase Accounts':'purchase','Direct Expenses':'direct_expense','Indirect Expenses':'indirect_expense'};
var SKIP_ROOTS={'Capital Account':1,'Revenue Account':1};
var CASH_VCH={'Bank Receipt':1,'Bank Payments':1,'Bank Payment':1,'Cash Paynent':1,'Cash Payment':1,'Cash Voucher':1,'Receipt':1,'Payment':1,'Contra':1};
var GRID_COL1=320;

function parseHierarchy(text){var j=JSON.parse(text);var g=j.groups||{};var l=j.ledgers||{};for(var k in TPG)if(!g.hasOwnProperty(k))g[k]=TPG[k];return{groups:g,ledgers:l};}

function mergeHierarchies(h1,h2){
  var g={},l={};
  var k;for(k in h1.groups)g[k]=h1.groups[k];for(k in h2.groups)if(!g.hasOwnProperty(k))g[k]=h2.groups[k];
  for(k in h1.ledgers)l[k]=h1.ledgers[k];for(k in h2.ledgers)if(!l.hasOwnProperty(k))l[k]=h2.ledgers[k];
  for(k in TPG)if(!g.hasOwnProperty(k))g[k]=TPG[k];
  return{groups:g,ledgers:l};
}

function findIBLedgers(xd){
  var ib={};
  for(var ln in xd.ledgers){
    if(xd.ledgers[ln]==='Branch / Divisions')ib[ln]=1;
    var ch=getChainRaw(ln,xd);if(ch.indexOf('Branch / Divisions')>=0)ib[ln]=1;
  }
  return ib;
}
function getChainRaw(name,xd){
  var p=xd.ledgers[name];if(!p){if(xd.groups[name])p=name;else return['Unclassified'];}
  var ch=[p];var sn={};while(p&&xd.groups[p]&&!sn[p]){sn[p]=1;p=xd.groups[p];if(p)ch.unshift(p);}return ch;
}

function parseStock(text){var lines=text.split('\n');var stock=Array(12).fill(0);for(var i=1;i<lines.length;i++){if(!lines[i].trim())continue;var c=lines[i].split(',');try{var idx=parseInt(c[0]);var am=parseFloat((c[1]||'0').replace(/,/g,''));if(!isNaN(idx)&&idx>=0&&idx<12)stock[idx]=am;}catch(ex){}}return stock;}
function generateStockTemplate(){var MN=['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];var csv='Month Index,Opening Stock Value,Month Name\n';for(var i=0;i<12;i++)csv+=i+',0,'+MN[i]+'\n';var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='stock_template.csv';a.click();}

function norm(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'');}
function stem(s){var w=s.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(function(t){return t.length>0;});return w.map(function(t){return t.replace(/s$/,'');}).sort().join('|');}
function buildLookups(xd){var lk={},tk={},gn={},gt={};for(var n in xd.ledgers){lk[norm(n)]=n;tk[stem(n)]=n;}for(var g in xd.groups){gn[norm(g)]=g;gt[stem(g)]=g;}return{lk:lk,tk:tk,gn:gn,gt:gt};}
function findParent(name,xd,lu){if(xd.ledgers[name])return xd.ledgers[name];var nk=norm(name);if(lu.lk[nk])return xd.ledgers[lu.lk[nk]];var st=stem(name);if(lu.tk[st])return xd.ledgers[lu.tk[st]];return null;}
function getChain(name,xd,lu){
  var p=findParent(name,xd,lu);
  if(!p){if(xd.groups[name])p=name;else{var nk=norm(name);if(lu.gn[nk])p=lu.gn[nk];else{var st=stem(name);if(lu.gt[st])p=lu.gt[st];else{var clean=name.replace(/'s /g,' ').replace(/'/g,'');var st2=stem(clean);if(lu.tk[st2]){p=xd.ledgers[lu.tk[st2]];if(p){var ch=[p];var sn={};while(p&&xd.groups[p]&&!sn[p]){sn[p]=1;p=xd.groups[p];if(p)ch.unshift(p);}return ch;}}if(lu.gt[st2])p=lu.gt[st2];}}}}
  if(!p)return['Unclassified'];
  var ch=[p];var sn={};while(p&&xd.groups[p]&&!sn[p]){sn[p]=1;p=xd.groups[p];if(p)ch.unshift(p);}return ch;
}
function classify(name,xd,lu,overrides){if(overrides&&overrides[name])return overrides[name];var chain=getChain(name,xd,lu);for(var i=0;i<chain.length;i++){if(PL_CATS[chain[i]])return PL_CATS[chain[i]];}return 'excluded';}
// Ledger category overrides (audit tool). Stored as {ledgerName: 'revenue'|'purchase'|'direct_expense'|'indirect_expense'|'excluded'}.
function loadLedgerOverrides(){try{if(!window.localStorage)return{};var raw=localStorage.getItem('cdc_ledger_overrides');return raw?JSON.parse(raw)||{}:{};}catch(e){return{};}}
function saveLedgerOverrides(o){try{if(window.localStorage)localStorage.setItem('cdc_ledger_overrides',JSON.stringify(o||{}));}catch(e){}}
// Invoice (voucher) → account overrides. Each Sales / Purchase voucher gets a stable key, and
// the user can re-route that single invoice's sale/purchase leg to a different account.
// Stored as {voucherKey: 'Sale - Packaging - Mono Carton'}.
function loadInvoiceOverrides(){try{if(!window.localStorage)return{};var raw=localStorage.getItem('cdc_invoice_acct_overrides');return raw?JSON.parse(raw)||{}:{};}catch(e){return{};}}
function saveInvoiceOverrides(o){try{if(window.localStorage)localStorage.setItem('cdc_invoice_acct_overrides',JSON.stringify(o||{}));}catch(e){}}
// Build a stable key for a voucher. Tries Tally voucher-number fields first; falls back to a
// composite of date + sorted ledger lines (stable across re-uploads of the same data).
function vchKey(v){
  if(v.voucher_no)return 'V:'+v.voucher_no;
  if(v.vchno)return 'V:'+v.vchno;
  if(v.vch_no)return 'V:'+v.vch_no;
  if(v.voucherNo)return 'V:'+v.voucherNo;
  if(v.number)return 'V:'+v.number;
  if(v.refNo)return 'V:'+v.refNo;
  if(v.ref)return 'V:'+v.ref;
  var amts=[];for(var ln in (v.ledgers||{}))amts.push(ln+':'+v.ledgers[ln]);amts.sort();
  return 'C:'+v.date+'|'+v.type+'|'+amts.join('|');
}
// monthKey: year-aware bin index. startFY is the FY-start year for bucket 0.
// e.g. startFY=2025 → Apr-2025 = 0, Mar-2026 = 11, Apr-2026 = 12, Mar-2027 = 23.
function monthKey(ds,startFY){var y=parseInt(ds.substring(0,4)),m=parseInt(ds.substring(4,6));var fy=m>=4?y:y-1;return(fy-startFY)*12+((m-4+12)%12);}

function buildTree(ledgerData,xd,lu,monthCount){monthCount=monthCount||12;
  var gA={};for(var ln in ledgerData){var mo=ledgerData[ln];if(mo.every(function(v){return v===0;}))continue;var ch=getChain(ln,xd,lu);var ig=ch[ch.length-1];if(!gA[ig])gA[ig]={};gA[ig][ln]=mo;}
  var gC={};for(var gn in xd.groups){var gp=xd.groups[gn];if(gp){if(!gC[gp])gC[gp]=[];if(gC[gp].indexOf(gn)<0)gC[gp].push(gn);}}
  function bn(gn,d){var nd={name:gn,monthly:Array(monthCount).fill(0),depth:d,type:'group'};var kids=(gC[gn]||[]).sort(),cns=[];for(var ki=0;ki<kids.length;ki++){var cg=kids[ki];if(SKIP_ROOTS[cg]){var gk=(gC[cg]||[]).sort();for(var gi=0;gi<gk.length;gi++){var gn2=bn(gk[gi],d+1);if(gn2.monthly.some(function(v){return v!==0;})){cns.push(gn2);gn2.monthly.forEach(function(v,i){nd.monthly[i]+=v;});}}if(gA[cg]){for(var aln in gA[cg]){var alm=gA[cg][aln];alm.forEach(function(v,i){nd.monthly[i]+=v;});cns.push({name:aln,monthly:alm,depth:d+1,type:'ledger'});}}continue;}var cn=bn(cg,d+1);if(cn.monthly.some(function(v){return v!==0;})){cns.push(cn);cn.monthly.forEach(function(v,i){nd.monthly[i]+=v;});}}if(cns.length)nd.children=cns;if(gA[gn]){var lN=[];for(var ln in gA[gn]){var lm=gA[gn][ln];lm.forEach(function(v,i){nd.monthly[i]+=v;});lN.push({name:ln,monthly:lm,depth:d+1,type:'ledger'});}lN.sort(function(a,b){return Math.abs(b.monthly.reduce(function(s,v){return s+v;},0))-Math.abs(a.monthly.reduce(function(s,v){return s+v;},0));});nd.ledgers=lN;}nd.monthly=nd.monthly.map(function(v){return Math.round(v*100)/100;});return nd;}
  var level2={};for(var root in SKIP_ROOTS){(gC[root]||[]).forEach(function(k){level2[k]=1;});}var orphans=[];for(var g in xd.groups){var p=xd.groups[g];if((!p||!xd.groups.hasOwnProperty(p))&&!SKIP_ROOTS[g])orphans.push(g);}var topArr=Object.keys(level2).concat(orphans);var seen={},unique=[];topArr.forEach(function(t){if(!seen[t]){seen[t]=1;unique.push(t);}});unique.sort();
  var tree=[];for(var ti=0;ti<unique.length;ti++){var n=bn(unique[ti],1);if(n.monthly.some(function(v){return v!==0;}))tree.push(n);}
  if(gA['Unclassified']){var un={name:'Unclassified',monthly:Array(monthCount).fill(0),depth:1,type:'group'};var uL=[];for(var ln in gA['Unclassified']){var lm=gA['Unclassified'][ln];lm.forEach(function(v,i){un.monthly[i]+=v;});uL.push({name:ln,monthly:lm,depth:2,type:'ledger'});}un.ledgers=uL;if(un.monthly.some(function(v){return v!==0;}))tree.push(un);}return tree;
}

function processData(vouchers,xd,stock,ibLedgers,monthCount,fyOffset,branch){
  monthCount=monthCount||12;fyOffset=fyOffset||0;branch=branch||'all';
  var ovr=loadLedgerOverrides();var invOvr=loadInvoiceOverrides();
  // Helper: dominant party in a voucher's party_ledgers map (by absolute amount).
  function __domParty(pls){var mx=0,d=null;for(var p in pls){var a=Math.abs(pls[p]);if(a>mx){mx=a;d=p;}}return d;}
  // Branch filter: when not 'all', restrict to vouchers tagged with that branch AND skip the
  // inter-branch elimination (the other branch is now an external party, not a sibling unit).
  if(branch!=='all'){vouchers=vouchers.filter(function(v){return v._branch===branch;});ibLedgers={};}
  var lu=buildLookups(xd);var MN=['Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
  var dates=vouchers.map(function(v){return v.date;}).sort();var lastD=dates[dates.length-1];var lastY=parseInt(lastD.substring(0,4)),lastM=parseInt(lastD.substring(4,6));var currentFY=lastM>=4?lastY:lastY-1;
  var startFY=currentFY+fyOffset;
  var fyStart=String(startFY)+'0401';var fyEnd=String(startFY+Math.ceil(monthCount/12))+'0401';
  vouchers=vouchers.filter(function(v){return v.date>=fyStart&&v.date<fyEnd;});
  var months=[];for(var __i=0;__i<monthCount;__i++){var __fyOff=Math.floor(__i/12);var __mi=__i%12;var __mo=(3+__mi)%12;var __yr=startFY+__fyOff+(__mo>=3?0:1);months.push(MN[__mi]+"'"+String(__yr).slice(-2));}

  // P&L: skip inter-branch ledgers. For audit purposes, classify a voucher as "Sale" or "Purchase"
  // INVOICE based on its CONTENT, not its Tally voucher type: a voucher with a revenue ledger leg
  // and a party leg is a sale invoice; a voucher with a purchase ledger leg and a party leg is a
  // purchase invoice. This catches every variant naming (Sales, Export Sale, Sales (Export),
  // Foreign Sale, Sales Invoice, etc.) without a hardcoded type list.
  var availSale={},availPurch={};
  var invoiceList=[];
  var __invTypeCounts={};// diagnostic — see which voucher types contributed
  var plData={revenue:{},purchase:{},direct_expense:{},indirect_expense:{},excluded:{}};
  for(var vi=0;vi<vouchers.length;vi++){var v=vouchers[vi];var mi=monthKey(v.date,startFY);if(mi<0||mi>=monthCount)continue;
    // Content-based side detection: walk this voucher's revenue / purchase ledger legs.
    var __revAmt=0,__purchAmt=0,__primaryAcct=null,__primaryAbs=0,__invoiceAmt=0;
    for(var __ll in v.ledgers){var __c0=classify(__ll,xd,lu,ovr);
      if(__c0==='revenue'){__revAmt+=v.ledgers[__ll];availSale[__ll]=true;}
      if(__c0==='purchase'){__purchAmt+=v.ledgers[__ll];availPurch[__ll]=true;}
      if(__c0==='revenue'||__c0==='purchase'){var __aa=Math.abs(v.ledgers[__ll]);if(__aa>__primaryAbs){__primaryAbs=__aa;__primaryAcct=__ll;}__invoiceAmt+=v.ledgers[__ll];}}
    var __hasParty=v.party_ledgers&&Object.keys(v.party_ledgers).length>0;
    var __isSale=__revAmt!==0&&__hasParty,__isPurch=__purchAmt!==0&&__hasParty,__isSP=__isSale||__isPurch;
    var __key=__isSP?vchKey(v):null;
    var __ovrAcct=__key&&invOvr[__key]?invOvr[__key]:null;
    for(var ln in v.ledgers){if(ibLedgers[ln])continue;var amt=v.ledgers[ln];var cat=classify(ln,xd,lu,ovr);
      var __effLn=ln,__effCat=cat;
      if(__ovrAcct&&(cat==='revenue'||cat==='purchase')){__effLn=__ovrAcct;__effCat=classify(__ovrAcct,xd,lu,ovr);}
      if(!plData[__effCat])plData[__effCat]={};if(!plData[__effCat][__effLn])plData[__effCat][__effLn]=Array(monthCount).fill(0);plData[__effCat][__effLn][mi]+=amt;}
    if(__isSP&&__primaryAcct){var __dp=__domParty(v.party_ledgers||{});
      var __sideTag=Math.abs(__revAmt)>=Math.abs(__purchAmt)?'sale':'purchase';
      __invTypeCounts[v.type]=(__invTypeCounts[v.type]||0)+1;
      invoiceList.push({key:__key,date:v.date,type:v.type,side:__sideTag,party:__dp||'(none)',primaryAccount:__primaryAcct,overrideAccount:__ovrAcct,amount:__invoiceAmt,overridden:!!__ovrAcct});}
    // Also check party_ledgers for P&L items (some expenses may be there)
    for(var ln in v.party_ledgers){if(ibLedgers[ln])continue;var cat2=classify(ln,xd,lu,ovr);if(cat2!=='excluded'){if(!plData[cat2])plData[cat2]={};if(!plData[cat2][ln])plData[cat2][ln]=Array(monthCount).fill(0);plData[cat2][ln][mi]+=v.party_ledgers[ln];}}
  }
  for(var cat in plData){for(var ln in plData[cat]){plData[cat][ln]=plData[cat][ln].map(function(v){return Math.round(v*100)/100;});}}

  // Cashflow: Approach G with inter-branch elimination
  var cfInflows={},cfOutflows={};
  var BK=['bank accounts','cash-in-hand','cash-in hand'];var OD=['bank od','bank occ'];
  function chainHas(pn,kws){var ch=getChain(pn,xd,lu).join('>').toLowerCase();for(var b=0;b<kws.length;b++){if(ch.indexOf(kws[b])>=0)return true;}return false;}
  var RCV={'Bank Receipt':1,'Receipt':1};var PAY={'Bank Payments':1,'Bank Payment':1,'Cash Paynent':1,'Cash Payment':1,'Cash Voucher':1,'Payment':1};
  for(var vi=0;vi<vouchers.length;vi++){var v=vouchers[vi];if(!CASH_VCH[v.type])continue;var mi=monthKey(v.date,startFY);if(mi<0||mi>=monthCount)continue;
    var pls=v.party_ledgers||{};var lds=v.ledgers||{};var all={};for(var k in pls)all[k]=pls[k];for(var k in lds)if(!all.hasOwnProperty(k))all[k]=lds[k];
    var isR=!!RCV[v.type],isP=!!PAY[v.type],isC=v.type==='Contra';
    for(var pn in all){if(ibLedgers[pn])continue;if(chainHas(pn,BK))continue;if(chainHas(pn,OD))continue;
      if(isR){if(!cfInflows[pn])cfInflows[pn]=Array(monthCount).fill(0);cfInflows[pn][mi]+=Math.round(all[pn]*100)/100;}
      else if(isP){if(!cfOutflows[pn])cfOutflows[pn]=Array(monthCount).fill(0);cfOutflows[pn][mi]+=Math.round(all[pn]*-1*100)/100;}
      else if(isC){var cv=Math.round(all[pn]*-1*100)/100;if(cv>0){if(!cfInflows[pn])cfInflows[pn]=Array(monthCount).fill(0);cfInflows[pn][mi]+=cv;}else if(cv<0){if(!cfOutflows[pn])cfOutflows[pn]=Array(monthCount).fill(0);cfOutflows[pn][mi]+=Math.abs(cv);}}
    }}

  // PCFC/PCRE Journal handling: Journals where Loan is Cr (negative in ledgers) = loan closure
  // The Dr side (debtor or branch in party_ledgers) = the source of repayment
  // Treat as: Inflow from debtor/source + Outflow to loan repayment
  var LOAN_KW=['secured loans','unsecured loans','pcfc','pcre','wcdl','term loan'];
  function isLoan(pn){var cs=getChain(pn,xd,lu).join('>').toLowerCase();for(var i=0;i<LOAN_KW.length;i++){if(cs.indexOf(LOAN_KW[i])>=0)return true;}return false;}
  for(var vi=0;vi<vouchers.length;vi++){var v=vouchers[vi];if(v.type!=='Journal')continue;var mi=monthKey(v.date,startFY);if(mi<0||mi>=monthCount)continue;
    var pls=v.party_ledgers||{};var lds=v.ledgers||{};
    // Check if any ledger entry is a loan being Cr'd (negative = reducing loan)
    var hasLoanCr=false;for(var ln in lds){if(lds[ln]<0&&isLoan(ln)){hasLoanCr=true;break;}}
    if(!hasLoanCr)continue;
    // Process: loan Cr entries → outflow (loan repayment), non-loan non-IB Dr entries → inflow (debtor receipt)
    for(var ln in lds){if(!isLoan(ln))continue;if(lds[ln]>=0)continue;// Only Cr loans
      var repayAmt=Math.round(Math.abs(lds[ln])*100)/100;
      if(!cfOutflows[ln])cfOutflows[ln]=Array(monthCount).fill(0);cfOutflows[ln][mi]+=repayAmt;}
    // Dr side in party_ledgers = inflow source (debtor or branch)
    for(var pn in pls){if(pls[pn]<=0)continue;if(ibLedgers[pn])continue;// Skip branch entries in consolidated
      var recAmt=Math.round(pls[pn]*100)/100;
      if(!cfInflows[pn])cfInflows[pn]=Array(monthCount).fill(0);cfInflows[pn][mi]+=recAmt;}
    // Also Dr entries in ledgers that are NOT loans (like currency diff) - these are expenses, skip for cashflow
  }

  // Branch Settlement Journals: Debtor Dr + Branch Cr in party_ledgers
  // Pattern: Ahmedabad journal → Dr MELBA (positive), Cr CDC Printers Kolkata (negative)
  // This means: client payment received by other branch, debtor squared off
  // Treat debtor side as INFLOW (receipt from client)

  var sActive=useState('consol'),active=sActive[0],setActive=sActive[1];
  var sConsol=useState(null),consolData=sConsol[0],setConsolData=sConsol[1];
  var sProj=useState(null),projData=sProj[0],setProjData=sProj[1];
  var sErr=useState(null),err=sErr[0],setErr=sErr[1];
  var sLd=useState(false),ld=sLd[0],setLd=sLd[1];
  var sMode=useState('mongo'),mode=sMode[0],setMode=sMode[1];
  var sApi=useState(''),apiBase=sApi[0],setApiBase=sApi[1];
  var sFrom=useState('2025-04-01'),fromD=sFrom[0],setFromD=sFrom[1];// full history default; change here to switch back to current-FY-only
  var sTo=useState(new Date().toISOString().slice(0,10)),toD=sTo[0],setToD=sTo[1];
  function setF(k){return function(file){var nf=Object.assign({},files);nf[k]=file;setFiles(nf);};}
  // cached bills/stock text
  var cachedTexts={};BILL_KEYS.forEach(function(k){var c=lcGet(k);if(c)cachedTexts[k]=c;});

  function go(){
    setErr(null);setLd(true);
    // File-upload mode: no live API, so the per-voucher PDF link is unavailable.
    try{window.__cdcFromApi=false;}catch(e){}
    var need=['kolHier','ahmHier','kolVouch','ahmVouch'];
    for(var i=0;i<need.length;i++){if(!files[need[i]]){setErr('Please upload all four JSON files (Kol + Ahm hierarchy & vouchers).');setLd(false);return;}}
    var keys=['kolHier','ahmHier','kolVouch','ahmVouch','kolBillsRecv','kolBillsPay','ahmBillsPay','stock'];
    var proms=keys.map(function(k){if(files[k])return files[k].text();if(cachedTexts[k])return Promise.resolve(cachedTexts[k]);return Promise.resolve(null);});
    Promise.all(proms).then(function(r){
      var texts={kolHier:r[0],ahmHier:r[1],kolVouch:r[2],ahmVouch:r[3],kolBillsRecv:r[4],kolBillsPay:r[5],ahmBillsPay:r[6]};
      var stockText=r[7];
      // Cache bills + stock text for next session
      BILL_KEYS.forEach(function(k,idx){var v=[r[4],r[5],r[6],r[7]][idx];if(files[k]&&v)lcSet(k,v);});
      setTimeout(function(){try{
        var cd=window.CDC_CONSOL.build(texts, stockText);
        var pd=window.CDC_PROJ.build(texts, asOf);
        setConsolData(cd);setProjData(pd);setBuilt({texts:texts,stockText:stockText,asOf:asOf});setLd(false);
      }catch(ex){setErr((ex&&ex.message||ex)+'\n'+(ex&&ex.stack||''));setLd(false);}},30);
    }).catch(function(ex){setErr(ex.message||String(ex));setLd(false);});
  }
  function goMongo(){
    setErr(null);setLd(true);
    var base=(apiBase||'').replace(/\/+$/,'');
    // Remember we're API-backed (and the base) so the drill-down can link each
    // voucher to its printable invoice/journal at <base>/voucher/.
    try{window.__cdcFromApi=true;window.__cdcApiBase=base;}catch(e){}
    var url=base+'/api/dataset?from='+ymdP(fromD)+'&to='+ymdP(toD)+'&branch=all';
    var bkeys=['kolBillsRecv','kolBillsPay','ahmBillsPay','stock'];
    var billProms=bkeys.map(function(k){if(files[k])return files[k].text();if(cachedTexts[k])return Promise.resolve(cachedTexts[k]);return Promise.resolve(null);});
    Promise.all(billProms).then(function(br){
      fetch(url).then(function(r){if(!r.ok)throw new Error('API '+r.status+' '+r.statusText);return r.json();}).then(function(d){
        var b=d.branches||{},kol=b.kol||{},ahm=b.ahm||{};
        var nk=(kol.vouchers||[]).length,na=(ahm.vouchers||[]).length;
        if(nk+na===0){setErr('No vouchers in that range. Load data via the pipeline first, or widen the range.');setLd(false);return;}
        var texts={
          kolHier:JSON.stringify(kol.hierarchy||{groups:{},ledgers:{}}),
          ahmHier:JSON.stringify(ahm.hierarchy||{groups:{},ledgers:{}}),
          kolVouch:JSON.stringify(kol.vouchers||[]),
          ahmVouch:JSON.stringify(ahm.vouchers||[]),
          kolBillsRecv:br[0],kolBillsPay:br[1],ahmBillsPay:br[2]
        };
        var stockText=br[3];
        setTimeout(function(){try{
          var cd=window.CDC_CONSOL.build(texts,stockText);
          var pd=window.CDC_PROJ.build(texts,toD);
          setConsolData(cd);setProjData(pd);setBuilt({texts:texts,stockText:stockText,asOf:toD});setLd(false);
        }catch(ex){setErr((ex&&ex.message||ex)+'\n'+(ex&&ex.stack||''));setLd(false);}},30);
      }).catch(function(ex){setErr('Fetch failed: '+ex.message);setLd(false);});
    });
  }
  function rebuildProj(newAsOf){setAsOf(newAsOf);if(built){try{setProjData(window.CDC_PROJ.build(built.texts,newAsOf));}catch(ex){}}}
  function reset(){setBuilt(null);setConsolData(null);setProjData(null);setFiles({});}

  if(!built){
    return e('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8fafc',padding:'20px',fontFamily:'Inter,-apple-system,sans-serif'}},
      e('div',{style:{width:'660px',padding:'28px',background:'#fff',border:'1px solid #e2e8f0',borderRadius:'16px',boxShadow:'0 8px 32px rgba(0,0,0,0.06)'}},
        e('div',{style:{textAlign:'center',marginBottom:'16px'}},
          e('div',{style:{fontSize:'10px',letterSpacing:'4px',color:'#94a3b8',textTransform:'uppercase',fontFamily:'monospace'}},'CDC FINANCE PORTAL'),
          e('h1',{style:{fontSize:'22px',fontWeight:700,margin:'4px 0 0'}},'One Upload → Every View'),
          e('p',{style:{color:'#64748b',fontSize:'12px',marginTop:'4px'}},'P&L · Cashflow · Ledger Audit · Projection · Receivables · Payables · Pred vs Actual'),
          e('div',{style:{marginTop:'8px',padding:'4px 10px',display:'inline-block',background:'#ecfdf5',border:'1px solid #a7f3d0',borderRadius:'12px',fontSize:'10px',fontFamily:'monospace',color:'#047857',letterSpacing:'1px'}},'v1.1 · 21-Jul-2026')),
        e('div',{style:{display:'flex',borderRadius:'8px',overflow:'hidden',border:'1px solid #cbd5e1',marginBottom:'14px'}},
          ['mongo','upload'].map(function(mm){var lbl=mm==='mongo'?'🗄 MongoDB (auto)':'📁 Upload files';return e('span',{key:mm,onClick:function(){setMode(mm);setErr(null);},style:{flex:1,textAlign:'center',padding:'8px 10px',cursor:'pointer',fontSize:'12px',fontFamily:'monospace',fontWeight:700,background:mode===mm?'#0891b2':'#f1f5f9',color:mode===mm?'#fff':'#475569'}},lbl);})),
        mode==='mongo'&&e('div',{style:{marginBottom:'4px'}},
          e('div',{style:{fontSize:'11px',color:'#475569',marginBottom:'8px',lineHeight:1.5}},'Fetches Kolkata + Ahmedabad data from the pipeline database for the range below (default: current FY to date). Bills CSVs stay optional (for projection).'),
          e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
            e('div',null,e('div',{style:{fontSize:'9px',fontWeight:700,color:'#94a3b8',fontFamily:'monospace'}},'FROM'),e('input',{type:'date',value:fromD,onChange:function(ev){setFromD(ev.target.value);},style:{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:'8px',fontFamily:'monospace',fontSize:'12px'}})),
            e('div',null,e('div',{style:{fontSize:'9px',fontWeight:700,color:'#94a3b8',fontFamily:'monospace'}},'TO / AS-OF'),e('input',{type:'date',value:toD,onChange:function(ev){setToD(ev.target.value);},style:{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:'8px',fontFamily:'monospace',fontSize:'12px'}}))),
          e('div',{style:{marginTop:'8px'}},e('div',{style:{fontSize:'9px',fontWeight:700,color:'#94a3b8',fontFamily:'monospace'}},'API BASE URL (blank = same server)'),e('input',{type:'text',value:apiBase,placeholder:'e.g. https://cdc-dashboard-api.onrender.com',onChange:function(ev){setApiBase(ev.target.value);},style:{width:'100%',padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:'8px',fontFamily:'monospace',fontSize:'12px'}}))),
        mode==='upload'&&e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}},
          e('div',null,e('div',{style:{fontSize:'10px',fontWeight:700,color:'#0891b2',fontFamily:'monospace',letterSpacing:'1px'}},'KOLKATA'),
            e(FileSlot,{label:'Hierarchy JSON',hint:'kol_hierarchy.json',accept:'.json',val:files.kolHier,onFile:setF('kolHier'),icon:'📋'}),
            e(FileSlot,{label:'Vouchers JSON',hint:'kol_vouchers.json',accept:'.json',val:files.kolVouch,onFile:setF('kolVouch'),icon:'📊'})),
          e('div',null,e('div',{style:{fontSize:'10px',fontWeight:700,color:'#7c3aed',fontFamily:'monospace',letterSpacing:'1px'}},'AHMEDABAD'),
            e(FileSlot,{label:'Hierarchy JSON',hint:'ahm_hierarchy.json',accept:'.json',val:files.ahmHier,onFile:setF('ahmHier'),icon:'📋'}),
            e(FileSlot,{label:'Vouchers JSON',hint:'ahm_vouchers.json',accept:'.json',val:files.ahmVouch,onFile:setF('ahmVouch'),icon:'📊'}))),
        e('div',{style:{marginTop:'12px',fontSize:'10px',fontWeight:700,color:'#d97706',fontFamily:'monospace',letterSpacing:'1px'}},'BILL-WISE (for Projection / Receivables / Payables)'),
        e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px'}},
          e(FileSlot,{label:'Kol Bills Receivable',hint:'CSV',accept:'.csv',val:files.kolBillsRecv,cached:!files.kolBillsRecv&&!!cachedTexts.kolBillsRecv,onFile:setF('kolBillsRecv'),icon:'📄'}),
          e(FileSlot,{label:'Kol Bills Payable',hint:'CSV',accept:'.csv',val:files.kolBillsPay,cached:!files.kolBillsPay&&!!cachedTexts.kolBillsPay,onFile:setF('kolBillsPay'),icon:'📄'}),
          e(FileSlot,{label:'Ahm Bills Payable',hint:'CSV opt.',accept:'.csv',val:files.ahmBillsPay,cached:!files.ahmBillsPay&&!!cachedTexts.ahmBillsPay,onFile:setF('ahmBillsPay'),icon:'📄'})),
        e('div',{style:{marginTop:'8px',fontSize:'10px',fontWeight:700,color:'#059669',fontFamily:'monospace',letterSpacing:'1px'}},'STOCK (for P&L stock change) + AS-OF DATE'),
        e('div',{style:{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:'8px',alignItems:'center'}},
          e(FileSlot,{label:'Stock Template CSV',hint:'optional',accept:'.csv',val:files.stock,cached:!files.stock&&!!cachedTexts.stock,onFile:setF('stock'),icon:'📦'}),
          e('div',{style:{display:'flex',flexDirection:'column',gap:'2px',marginTop:'4px'}},e('span',{style:{fontSize:'9px',color:'#94a3b8',fontFamily:'monospace'}},'AS-OF DATE (projection)'),
            e('input',{type:'date',value:asOf,onChange:function(ev){setAsOf(ev.target.value);},style:{padding:'8px 10px',border:'1px solid #e2e8f0',borderRadius:'8px',fontFamily:'monospace',fontSize:'12px'}}))),
        err&&e('div',{style:{padding:'10px',borderRadius:'8px',background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',marginTop:'10px',fontSize:'11px',fontFamily:'monospace',whiteSpace:'pre-wrap'}},err),
        e('button',{onClick:mode==='mongo'?goMongo:go,disabled:ld,style:{width:'100%',marginTop:'14px',padding:'13px',borderRadius:'10px',border:'none',fontSize:'14px',fontWeight:600,cursor:ld?'wait':'pointer',background:ld?'#94a3b8':'#0891b2',color:'#fff'}},ld?(mode==='mongo'?'Fetching…':'Building all views…'):(mode==='mongo'?'Fetch from MongoDB → Open Portal':'Open Portal'))));
  }

  // Portal chrome + active app
  function navBtn(id,label,color){return e('button',{key:id,onClick:function(){setActive(id);},style:{padding:'8px 18px',borderRadius:'8px',border:active===id?('2px solid '+color):'1px solid #e2e8f0',background:active===id?color:'#fff',color:active===id?'#fff':'#475569',fontSize:'12px',fontFamily:'monospace',fontWeight:700,cursor:'pointer',letterSpacing:'0.5px'}},label);}
  var activeEl=active==='consol'
    ? e(window.CDC_CONSOL.Dash,{data:consolData,setData:setConsolData,onReset:reset})
    : e(window.CDC_PROJ.Dash,{data:projData,onReset:reset});
  return e('div',{style:{minHeight:'100vh',background:'#fff'}},
    e('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'10px 20px',borderBottom:'2px solid #e2e8f0',background:'#f8fafc',position:'sticky',top:0,zIndex:200,flexWrap:'wrap'}},
      e('span',{style:{fontSize:'11px',fontWeight:700,color:'#0f172a',fontFamily:'monospace',letterSpacing:'1px',marginRight:'6px'}},'CDC FINANCE'),
      navBtn('consol','📘 Consolidated (P&L / Cashflow / Audit)','#0891b2'),
      navBtn('proj','📈 Projected (Projection / Receivables / Payables / PvA)','#be185d'),
      active==='proj'?e('div',{style:{display:'flex',alignItems:'center',gap:'5px',marginLeft:'6px'}},e('span',{style:{fontSize:'9px',color:'#94a3b8',fontFamily:'monospace'}},'as-of'),e('input',{type:'date',value:asOf,onChange:function(ev){rebuildProj(ev.target.value);},style:{padding:'4px 8px',border:'1px solid #e2e8f0',borderRadius:'6px',fontFamily:'monospace',fontSize:'11px'}})):null,
      e('button',{onClick:reset,style:{marginLeft:'auto',padding:'6px 12px',borderRadius:'6px',border:'1px solid #e2e8f0',background:'#fff',color:'#64748b',fontSize:'11px',fontFamily:'monospace',cursor:'pointer'}},'↩ New upload')),
    e('div',{key:active},activeEl));
}
ReactDOM.render(e(Portal),document.getElementById('root'));

</script>
