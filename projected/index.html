var TPG={'Capital Account':null,'Revenue Account':null,'Current Assets':'Capital Account','Current Liabilities':'Capital Account','Fixed Assets':'Capital Account','Loans (Liability)':'Capital Account','Investments':'Capital Account','Suspense A/c':'Capital Account','Misc. Expenses (ASSET)':'Capital Account','Branch / Divisions':'Capital Account','Direct Incomes':'Revenue Account','Direct Expenses':'Revenue Account','Indirect Incomes':'Revenue Account','Indirect Expenses':'Revenue Account','Sales Accounts':'Revenue Account','Purchase Accounts':'Revenue Account','Reserves & Surplus':'Capital Account'};
function parseHierarchy(t){var j=JSON.parse(t);var g=j.groups||{};var l=j.ledgers||{};for(var k in TPG)if(!g.hasOwnProperty(k))g[k]=TPG[k];return{groups:g,ledgers:l};}
function mergeH(h1,h2){var g={},l={};for(var k in h1.groups)g[k]=h1.groups[k];for(var k in h2.groups)if(!g[k])g[k]=h2.groups[k];for(var k in h1.ledgers)l[k]=h1.ledgers[k];for(var k in h2.ledgers)if(!l[k])l[k]=h2.ledgers[k];for(var k in TPG)if(!g[k])g[k]=TPG[k];return{groups:g,ledgers:l};}
function getChain(n,xd){var p=xd.ledgers[n];if(!p){if(xd.groups[n])p=n;else{for(var ln in xd.ledgers)if(ln.toLowerCase()===n.toLowerCase()){p=xd.ledgers[ln];break;}}}if(!p)return['Unclassified'];var ch=[p],sn={};while(p&&xd.groups[p]&&!sn[p]){sn[p]=1;p=xd.groups[p];if(p)ch.unshift(p);}return ch;}
function chainHas(n,xd,kws){var cs=getChain(n,xd).join('>').toLowerCase();for(var i=0;i<kws.length;i++)if(cs.indexOf(kws[i])>=0)return true;return false;}
function findIB(xd){var ib={};for(var ln in xd.ledgers)if(chainHas(ln,xd,['branch / divisions']))ib[ln]=1;return ib;}
function parseDate(ds){if(!ds||ds.length<8)return new Date(2025,3,1);return new Date(parseInt(ds.substring(0,4)),parseInt(ds.substring(4,6))-1,parseInt(ds.substring(6,8)));}
function daysBtw(d1,d2){return Math.round((d2-d1)/(864e5));}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function toYMD(d){return String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}
function parseTD(s){if(!s)return null;s=s.trim();var m={'Jan':0,'Feb':1,'Mar':2,'Apr':3,'May':4,'Jun':5,'Jul':6,'Aug':7,'Sep':8,'Oct':9,'Nov':10,'Dec':11};var p=s.split('-');if(p.length!==3)return null;var d=parseInt(p[0]),mo=m[p[1]],y=parseInt(p[2]);if(isNaN(d)||mo===undefined||isNaN(y))return null;if(y<100)y+=y<50?2000:1900;return new Date(y,mo,d);}
function parseBillsCSV(text){var lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');var bills=[];var started=false;
for(var i=0;i<lines.length;i++){var line=lines[i].trim();if(!line)continue;if(line.indexOf('Date')===0&&line.indexOf('Ref. No.')>0){started=true;continue;}if(line.indexOf(',,,Amount')>=0)continue;if(!started)continue;
var fields=[];var cur='';var inQ=false;for(var ci=0;ci<line.length;ci++){var ch=line[ci];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){fields.push(cur.trim());cur='';}else cur+=ch;}fields.push(cur.trim());
if(fields.length<4)continue;var dt=parseTD(fields[0]);if(!dt)continue;var party=fields[2]||'';if(!party)continue;
var amtClean=(fields[3]||'').replace(/,/g,'').replace(/Dr/gi,'').replace(/Cr/gi,'').trim();
var rawAmt=parseFloat(amtClean)||0;if(rawAmt===0)continue;
var refNo=fields[1]||'';
var due=fields.length>4?parseTD(fields[4]):dt;var od=fields.length>5?parseInt(fields[5])||0:0;
var isAdv=rawAmt<0;
bills.push({date:toYMD(dt),dateObj:dt,refNo:refNo,party:party,amount:Math.abs(rawAmt),dueDate:due||dt,overdueDays:od,isAdvance:isAdv});}return bills;}
function fmt(n){if(n===0)return'\u2014';var a=Math.abs(n),s=n<0?'-':'';if(a>=1e7)return s+(a/1e7).toFixed(2)+' Cr';if(a>=1e5)return s+(a/1e5).toFixed(2)+' L';if(a>=1e3)return s+(a/1e3).toFixed(1)+' K';return s+Math.round(a);}

function buildProjection(vouchers,xd,ib,recBills,payBills,asOfDate){
var today=asOfDate||new Date();var todayYMD=toYMD(today);
// Diagnostic: expose first 3 Sales/Debit-Note vouchers so we can see what fields are available
// to extract an invoice number from. Open DevTools → window.__vchSample
try{var __sm=[];for(var __vi=0;__vi<vouchers.length&&__sm.length<3;__vi++){var __v=vouchers[__vi];if(__v.type==='Sales'||__v.type==='Export Sale'||__v.type==='Debit Note')__sm.push(__v);}window.__vchSample=__sm;if(__sm.length>0)console.log('%c[Voucher Sample]','color:#0891b2;font-weight:bold','First Sales/DN voucher KEYS:',Object.keys(__sm[0]),'· FULL OBJECT:',__sm[0]);}catch(e){}
var SALE={'Sales':1,'Export Sale':1,'Sales - Duty Draw Back':1};var PURCH={'Purchase':1};
var RCV={'Bank Receipt':1,'Receipt':1};var PAY={'Bank Payments':1,'Bank Payment':1,'Cash Paynent':1,'Cash Payment':1,'Cash Voucher':1,'Payment':1};
var LKW=['secured loans','unsecured loans','pcfc','pcre','wcdl','term loan'];
function isL(p){return chainHas(p,xd,LKW);}function isD(p){return chainHas(p,xd,['sundry debtors']);}function isC(p){return chainHas(p,xd,['sundry creditors']);}function isIE(p){return chainHas(p,xd,['indirect expenses']);}
// Non-cash IE — ledger names that hit P&L as "Indirect Expense" but never move cash:
// depreciation, provisions (gratuity, bonus, audit accrual), amortization, write-offs,
// bad debt etc. Exclude these from the cash-flow projection by ledger NAME pattern.
function isNonCashIE(p){var n=(p||'').toLowerCase();
  return n.indexOf('depreciation')>=0||n.indexOf('depriciation')>=0
      ||n.indexOf('provision')>=0
      ||n.indexOf('amortization')>=0||n.indexOf('amortisation')>=0
      ||n.indexOf('written off')>=0||n.indexOf('write off')>=0||n.indexOf('write-off')>=0
      ||n.indexOf('bad debt')>=0;}

// Step 1: Collect invoices and receipts from vouchers
// ieByMonth is keyed by YYYYMM (not month-only) so vouchers from different FYs don't collide.
var dInv={},dRct={},cInv={},cPay={},ieByMonth={};
// IE diagnostics — open DevTools Console and read window.__ieDebug to see what was found / skipped.
var __ieDebug={byVoucherType:{},skippedByVoucherType:{},sampleHits:[],sampleSkips:[],totalVouchersWithIE:0,totalAmount:0};
for(var vi=0;vi<vouchers.length;vi++){var v=vouchers[vi],vt=v.type,pls=v.party_ledgers||{},lds=v.ledgers||{};
if(v.date>todayYMD)continue;// Skip vouchers after as-of date
if(SALE[vt])for(var p in pls){if(!isD(p)||ib[p])continue;var a=Math.abs(pls[p]);if(a<1)continue;(dInv[p]=dInv[p]||[]).push({date:v.date,amt:a,ref:v.no||v.voucher_no||v.vchno||v.vch_no||v.voucherNo||v.number||v.refNo||v.ref||''});}
if(PURCH[vt])for(var p in pls){if(!isC(p)||ib[p])continue;var a=Math.abs(pls[p]);if(a<1)continue;(cInv[p]=cInv[p]||[]).push({date:v.date,amt:a});}
if(RCV[vt])for(var p in pls){if(!isD(p)||ib[p])continue;var a=Math.abs(pls[p]);if(a<1)continue;(dRct[p]=dRct[p]||[]).push({date:v.date,amt:a});}
if(PAY[vt])for(var p in pls){if(!isC(p)||ib[p])continue;var a=Math.abs(pls[p]);if(a<1)continue;(cPay[p]=cPay[p]||[]).push({date:v.date,amt:a});}
if(vt==='Journal'){var hLC=false;for(var ln in lds)if(lds[ln]<0&&isL(ln)){hLC=true;break;}
if(hLC){for(var p in pls){if(!isD(p)||ib[p]||pls[p]<=0)continue;(dRct[p]=dRct[p]||[]).push({date:v.date,amt:pls[p]});}}
else{var hB=false;for(var p in pls)if(ib[p]){hB=true;break;}if(hB)for(var p in pls){if(ib[p]||!isD(p)||pls[p]<=0)continue;(dRct[p]=dRct[p]||[]).push({date:v.date,amt:pls[p]});}}
for(var p in pls){if(pls[p]>=0||!isC(p)||ib[p])continue;(cPay[p]=cPay[p]||[]).push({date:v.date,amt:Math.abs(pls[p])});}
for(var l in lds){if(lds[l]>=0||!isC(l)||ib[l])continue;(cPay[l]=cPay[l]||[]).push({date:v.date,amt:Math.abs(lds[l])});}}
if(vt==='Debit Note')for(var p in pls){if(pls[p]>=0||!isC(p)||ib[p])continue;(cPay[p]=cPay[p]||[]).push({date:v.date,amt:Math.abs(pls[p])});}
// Credit Notes: Dr debtor (positive) = cancels invoice → treat as receipt for debtor
if(vt==='Credit Notes'||vt==='Credit Note'){for(var p in pls){if(pls[p]<=0)continue;if(isD(p)&&!ib[p]){(dRct[p]=dRct[p]||[]).push({date:v.date,amt:pls[p]});}}}
// Debit Notes on debtors: Cr debtor (negative) = additional charge → treat as invoice
if(vt==='Debit Note'){for(var p in pls){if(pls[p]>=0)continue;if(isD(p)&&!ib[p]){(dInv[p]=dInv[p]||[]).push({date:v.date,amt:Math.abs(pls[p]),ref:v.no||v.voucher_no||v.vchno||v.vch_no||v.voucherNo||v.number||v.refNo||v.ref||'DN'});}}}
// Indirect expenses: only skip Purchase vouchers (those flow through creditor cycle, double count).
// For each IE ledger leg, also skip if the LEDGER name matches non-cash patterns (depreciation,
// provision, amortization, write-off, bad debt). Net result: salary, electricity, bank charges,
// interest, rent etc. all count; depreciation/gratuity/audit provisions drop out at source —
// so accrual months don't inflate the projection.
// Sum SIGNED values per YYYYMM bin (multi-FY data doesn't collide on month-only key).
var __ieLs=[];for(var __l in lds)if(isIE(__l))__ieLs.push(__l);
var __vIE=__ieLs.length>0,__vIEAmt=0;for(var __k=0;__k<__ieLs.length;__k++)__vIEAmt+=lds[__ieLs[__k]];
if(__vIE){__ieDebug.totalVouchersWithIE++;__ieDebug.totalAmount+=__vIEAmt;
  if(vt==='Purchase'){var __r='Purchase (creditor cycle)';__ieDebug.skippedByVoucherType[__r]=(__ieDebug.skippedByVoucherType[__r]||0)+1;
    if(__ieDebug.sampleSkips.length<5)__ieDebug.sampleSkips.push({date:v.date,vt:vt,amt:__vIEAmt,ledgers:__ieLs,reason:__r});}
  else{__ieDebug.byVoucherType[vt]=(__ieDebug.byVoucherType[vt]||0)+1;if(__ieDebug.sampleHits.length<5)__ieDebug.sampleHits.push({date:v.date,vt:vt,amt:__vIEAmt,ledgers:__ieLs});}}
if(vt!=='Purchase'){var ymKey=v.date.substring(0,6);for(var l in lds)if(isIE(l)&&!isNonCashIE(l))ieByMonth[ymKey]=(ieByMonth[ymKey]||0)+lds[l];}}

// Step 2: Combined FIFO — opening bills + this year's invoices vs receipts
// Returns {avgDays, unpaid:[{date,amt,ref}], matchedAmt}
function combinedFIFO(openBills,yearInvs,yearRcts){
  var evs=[];
  for(var i=0;i<openBills.length;i++){var b=openBills[i];
    if(b.isAdvance){evs.push({d:b.date,a:b.amount,t:'r',ref:b.refNo||'ADV'});}// Advance = pre-payment
    else{evs.push({d:b.date,a:b.amount,t:'i',ref:b.refNo||'OB'});}}
  for(var i=0;i<(yearInvs||[]).length;i++){var inv=yearInvs[i];evs.push({d:inv.date,a:inv.amt,t:'i',ref:inv.ref||'INV'});}
  for(var i=0;i<(yearRcts||[]).length;i++){var r=yearRcts[i];evs.push({d:r.date,a:r.amt,t:'r',ref:'RCT'});}
  evs.sort(function(a,b){return a.d<b.d?-1:a.d>b.d?1:(a.t==='i'?-1:1);});

  var q=[],da=[],adv=0;
  for(var i=0;i<evs.length;i++){var ev=evs[i];
    if(ev.t==='i'){
      var rem=ev.a;
      if(adv>0){var ab=Math.min(adv,rem);adv-=ab;rem-=ab;if(ab>0.5)da.push({d:0,a:ab});}
      if(rem>0.5)q.push({d:ev.d,r:rem,ref:ev.ref});
    } else {
      var ra=ev.a,rd=parseDate(ev.d);
      for(var qi=0;qi<q.length&&ra>0.5;qi++){
        if(q[qi].r<0.5)continue;
        var mt=Math.min(q[qi].r,ra);q[qi].r-=mt;ra-=mt;
        var dy=daysBtw(parseDate(q[qi].d),rd);
        if(dy>=0)da.push({d:Math.min(dy,730),a:mt});// cap at 730 for avg calc
      }
      if(ra>0.5)adv+=ra;
    }
  }
  // Remaining unpaid
  var unpaid=[];
  for(var qi=0;qi<q.length;qi++){if(q[qi].r>0.5)unpaid.push({date:q[qi].d,amt:q[qi].r,ref:q[qi].ref});}
  // Weighted avg days (only from matches, not from >730d)
  var tw=0,ta=0;
  for(var i=0;i<da.length;i++){if(da[i].d<=360){tw+=da[i].d*da[i].a;ta+=da[i].a;}}
  var avg=ta>0?Math.round(tw/ta):-1;
  return{avgDays:avg,unpaid:unpaid,matchedAmt:ta};
}

// Step 3: Process debtors
// Group opening bills by party
var obByD={};for(var i=0;i<recBills.length;i++){var b=recBills[i];(obByD[b.party]=obByD[b.party]||[]).push(b);}
// Get all debtor parties (from opening bills + this year's invoices)
var allDebtors={};for(var p in obByD)allDebtors[p]=1;for(var p in dInv)allDebtors[p]=1;

var dStats={};// {party: {avgDays, unpaid, outstanding, group}}
for(var p in allDebtors){
  var ob=obByD[p]||[];var inv=dInv[p]||[];var rct=dRct[p]||[];
  var res=combinedFIFO(ob,inv,rct);
  var outstanding=res.unpaid.reduce(function(s,u){return s+u.amt;},0);
  dStats[p]={avgDays:res.avgDays,unpaid:res.unpaid,outstanding:outstanding,matchedAmt:res.matchedAmt};}

// Group & company averages for debtors
var dAvg={};for(var p in dStats){if(dStats[p].avgDays>=0)dAvg[p]=dStats[p].avgDays;}
function getGrp(p,root){var ch=getChain(p,xd);for(var i=0;i<ch.length;i++)if(ch[i]===root&&i+1<ch.length)return ch[i+1];return'Other';}
function grpAvgs(pa,root){var gd={};for(var p in pa){var g=getGrp(p,root);if(!gd[g])gd[g]={t:0,c:0};gd[g].t+=pa[p];gd[g].c++;}var r={};for(var g in gd)if(gd[g].c>0)r[g]=Math.round(gd[g].t/gd[g].c);return r;}
var dGA=grpAvgs(dAvg,'Sundry Debtors');
var dt=0,dc=0;for(var p in dAvg){dt+=dAvg[p];dc++;}var cdAvg=dc>0?Math.round(dt/dc):-1;
function effDays(p,pa,ga,ca,root){if(pa.hasOwnProperty(p))return{days:pa[p],source:'own'};var g=getGrp(p,root);if(ga[g]!==undefined)return{days:ga[g],source:'group'};if(ca>=0)return{days:ca,source:'company'};return{days:-1,source:'none'};}

// Project debtors
var pMo=[];var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
for(var m=0;m<3;m++){var md=new Date(today.getFullYear(),today.getMonth()+m,1);pMo.push(mn[md.getMonth()]+"'"+String(md.getFullYear()).slice(-2));}
function pmi(d){for(var m=0;m<3;m++){var md=new Date(today.getFullYear(),today.getMonth()+m,1);if(d.getMonth()===md.getMonth()&&d.getFullYear()===md.getFullYear())return m;}return-1;}

var pIn={},pInSt={},pInM=[0,0,0],exD={},tDOS=0,incDC=0;
for(var p in dStats){
  var ds=dStats[p];if(ds.outstanding<1)continue;
  tDOS+=ds.outstanding;
  var ef=effDays(p,dAvg,dGA,cdAvg,'Sundry Debtors');
  // Exclusion: no payment history OR avg > 360
  if(ef.days<0||ef.days>360){exD[p]={reason:ef.days<0?'no_history':'over_360',days:ef.days,outstanding:ds.outstanding};continue;}
  // Also exclude individual bills overdue > 360 days with no payment pattern
  var pa=[0,0,0],tp=0,ul=[],exBillAmt=0;
  for(var bi=0;bi<ds.unpaid.length;bi++){
    var b=ds.unpaid[bi];
    var billAge=daysBtw(parseDate(b.date),today);
    // If bill is older than 360 days AND party has no own payment history, likely won't pay
    if(billAge>360&&ef.source!=='own'){exBillAmt+=b.amt;continue;}
    var pd=addDays(parseDate(b.date),ef.days);
    if(!pd||isNaN(pd.getTime())||pd<today)pd=new Date(today.getTime());// overdue or invalid → expect this month
    var mi=pmi(pd);
    if(mi>=0){pa[mi]+=b.amt;tp+=b.amt;}
    ul.push({date:b.date,amt:b.amt,ref:b.ref||''});
  }
  if(exBillAmt>0&&tp<1){exD[p]={reason:'all_bills_stale',days:ef.days,outstanding:ds.outstanding};continue;}
  if(tp>0){var gr=getGrp(p,'Sundry Debtors');pIn[p]=pa;pInSt[p]={days:ef.days,source:ef.source,outstanding:ds.outstanding,projected:tp,group:gr,unpaidList:ul,excludedBills:exBillAmt};for(var m=0;m<3;m++)pInM[m]+=pa[m];incDC++;
  } else if(ds.outstanding>0){exD[p]={reason:'due_after_3mo',days:ef.days,outstanding:ds.outstanding};}
}

// Step 4: Process creditors (same logic)
var obByC={};for(var i=0;i<payBills.length;i++){var b=payBills[i];(obByC[b.party]=obByC[b.party]||[]).push(b);}
var allCreditors={};for(var p in obByC)allCreditors[p]=1;for(var p in cInv)allCreditors[p]=1;
var cStats={};
for(var p in allCreditors){
  var ob=obByC[p]||[];var inv=cInv[p]||[];var pay=cPay[p]||[];
  var res=combinedFIFO(ob,inv,pay);
  cStats[p]={avgDays:res.avgDays,unpaid:res.unpaid,outstanding:res.unpaid.reduce(function(s,u){return s+u.amt;},0),matchedAmt:res.matchedAmt};}

var cAvgMap={};for(var p in cStats){if(cStats[p].avgDays>=0)cAvgMap[p]=cStats[p].avgDays;}
var cGA=grpAvgs(cAvgMap,'Sundry Creditors');
var ct=0,cc=0;for(var p in cAvgMap){ct+=cAvgMap[p];cc++;}var ccAvg=cc>0?Math.round(ct/cc):-1;

var pOut={},pOutSt={},pOutM=[0,0,0],exC={},tCOS=0,incCC=0;
for(var p in cStats){
  var cs=cStats[p];if(cs.outstanding<1)continue;
  tCOS+=cs.outstanding;
  var ef=effDays(p,cAvgMap,cGA,ccAvg,'Sundry Creditors');
  if(ef.days<0||ef.days>360){exC[p]={reason:ef.days<0?'no_history':'over_360',days:ef.days,outstanding:cs.outstanding};continue;}
  var pa=[0,0,0],tp=0,ul=[],exBA=0;
  for(var bi=0;bi<cs.unpaid.length;bi++){
    var b=cs.unpaid[bi];var billAge=daysBtw(parseDate(b.date),today);
    if(billAge>360&&ef.source!=='own'){exBA+=b.amt;continue;}
    var pd=addDays(parseDate(b.date),ef.days);
    if(!pd||isNaN(pd.getTime())||pd<today)pd=new Date(today.getTime());var mi=pmi(pd);
    if(mi>=0){pa[mi]+=b.amt;tp+=b.amt;}ul.push({date:b.date,amt:b.amt,ref:b.ref||''});
